name: guardia_movil
description: "Plataforma móvil de videovigilancia comunitaria con IA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Networking
  dio: ^5.4.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Code Generation
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  
  # Localization
  intl: ^0.19.0
  
  # Image handling
  cached_network_image: ^3.3.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # UI
  cupertino_icons: ^1.0.2
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.66.0
  
  # Maps (free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Permissions & Platform
  permission_handler: ^11.0.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  share_plus: ^7.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0
  geolocator: ^12.0.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  local_auth: ^2.3.0
  cloud_functions: ^6.0.7
  lucide_icons_flutter: ^3.1.10
  video_player: ^2.8.1
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code generation tools
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  
  # Linting
  flutter_lints: ^3.0.0

  # App Icon
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/GuardIA.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/GuardIA.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/GuardIA.png
    - assets/videos/
